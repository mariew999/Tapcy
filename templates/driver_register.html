{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Driver Portal</h2>

    <div style="margin-bottom: 20px;">
        <button onclick="showLogin()" id="loginBtn" class="btn" style="background: purple; margin-right: 10px;">Login</button>
        <button onclick="showRegister()" id="registerBtn" class="btn" style="background: gray;">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
        <h3>Login to Accept Rides</h3>
        <form method="POST" action="{{ url_for('views.driver_login') }}">
            <label>Email</label>
            <input type="email" name="email" placeholder="Email (example@mail.com)" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display: none;">
        <h3>Create Driver Account</h3>
        <form method="POST" action="{{ url_for('views.driver_register') }}" onsubmit="return validateForm()">
            <input type="text" name="name" id="name" placeholder="Full Name" required>

            <input type="text" name="phone" id="phone" placeholder="Phone Number (11 digits)" required>
            <small style="color: #999; display: block; margin-top: -5px; margin-bottom: 10px;">Example: 09123456789</small>

            <input type="email" name="email" id="email" placeholder="Email (example@mail.com)" required>

            <input type="text" name="tricycle" id="tricycle" placeholder="Tricycle Number" required>

            <input type="password" name="password" id="password" placeholder="Password" required>

            <input type="password" name="confirm" id="confirm" placeholder="Confirm Password" required>

            <button type="submit">Register</button>
        </form>
        <p style="margin-top: 15px;">After registration, login with your email and password</p>
    </div>
</div>

<script>
    function showLogin() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginBtn').style.background = 'purple';
        document.getElementById('registerBtn').style.background = 'gray';
    }

    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('loginBtn').style.background = 'gray';
        document.getElementById('registerBtn').style.background = 'purple';
    }

    function validateForm() {
        var phone = document.getElementById('phone').value;
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var confirm = document.getElementById('confirm').value;
        var tricycle = document.getElementById('tricycle').value;

        if (!/^\d{11}$/.test(phone)) {
            alert('Phone number must be exactly 11 digits');
            return false;
        }

        if (!email.includes('@')) {
            alert('Email must contain @ symbol');
            return false;
        }

        if (password.length < 8) {
            alert('Password must be at least 8 characters');
            return false;
        }

        if (password !== confirm) {
            alert('Passwords do not match');
            return false;
        }

        if (tricycle.trim() === '') {
            alert('Please enter tricycle number');
            return false;
        }

        return true;
    }
</script>
{% endblock %}
