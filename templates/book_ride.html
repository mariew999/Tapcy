{% extends "base.html" %}

{% block content %}
<div class="booking-container">
    <div class="booking-card">
        <div class="booking-header">
            <div class="emoji-large">🚕✨</div>
            <h1>Book Your Ride</h1>
            <p>Hi <strong>{{ passenger.name }}</strong>! Where to today?</p>
        </div>

        <form method="POST" action="{{ url_for('views.book_ride') }}" onsubmit="return prepareSubmit()">
            <!-- PICKUP LOCATION -->
            <div class="form-group">
                <label class="form-label">📍 Pick-up Barangay</label>
                <select name="pickup" id="pickup" class="form-select" required>
                    <option value="">-- Select Pickup Barangay --</option>
                    <option value="Magassi">Magassi</option>
                    <option value="Balasig">Balasig</option>
                    <option value="Cansan">Cansan</option>
                    <option value="Angancasilian">Angancasilian</option>
                    <option value="Garita">Garita</option>
                    <option value="Cubag">Cubag</option>
                    <option value="Ngarag">Ngarag</option>
                    <option value="Anao">Anao</option>
                    <option value="Centro">Centro</option>
                    <option value="Catabayungan">Catabayungan</option>
                    <option value="Casibarag Sur">Casibarag Sur</option>
                    <option value="Casibarag Norte">Casibarag Norte</option>
                    <option value="Luquilu">Luquilu</option>
                </select>
            </div>

            <!-- PUROK / DETAILS (Optional) -->
            <div class="form-group">
                <label class="form-label">📍 Specific Purok / Landmark (Optional)</label>
                <input type="text" name="pickup_details" id="pickup_details" class="form-input" 
                       placeholder="e.g., Purok 6, near church, beside school">
                <small class="input-hint">Adding details helps the driver find you faster.</small>
            </div>

            <!-- DROPOFF LOCATION (NOW A DROPDOWN) -->
            <div class="form-group">
                <label class="form-label">🏁 Drop-off Barangay</label>
                <select name="dropoff" id="dropoff" class="form-select" required>
                    <option value="">-- Select Drop-off Barangay --</option>
                    <option value="Magassi">Magassi</option>
                    <option value="Balasig">Balasig</option>
                    <option value="Cansan">Cansan</option>
                    <option value="Angancasilian">Angancasilian</option>
                    <option value="Garita">Garita</option>
                    <option value="Cubag">Cubag</option>
                    <option value="Ngarag">Ngarag</option>
                    <option value="Anao">Anao</option>
                    <option value="Centro">Centro</option>
                    <option value="Catabayungan">Catabayungan</option>
                    <option value="Casibarag Sur">Casibarag Sur</option>
                    <option value="Casibarag Norte">Casibarag Norte</option>
                    <option value="Luquilu">Luquilu</option>
                </select>
            </div>

            <!-- PASSENGERS & FARE -->
            <div class="form-group">
                <label class="form-label">👥 Number of Passengers</label>
                <select name="passengers" id="passengers" class="form-select" onchange="updateFare()" required>
                    <option value="1">1 Passenger</option>
                    <option value="2">2 Passengers</option>
                    <option value="3">3 Passengers</option>
                    <option value="4">4 Passengers</option>
                </select>
            </div>

            <!-- FARE DISPLAY -->
            <div class="fare-card">
                <div class="fare-label">💰 Total Fare</div>
                <div class="fare-amount">₱<span id="fare_amount">40</span></div>
                <div class="fare-note">Base fare: ₱40 per passenger</div>
            </div>

            <!-- SUBMIT BUTTON -->
            <button type="submit" class="submit-btn">✅ Confirm Booking</button>
        </form>

        <div class="back-link">
            <a href="{{ url_for('views.passenger_dashboard') }}">← Back to Dashboard</a>
        </div>
    </div>
</div>

<style>
    .booking-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
    }

    .booking-card {
        background: white;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        overflow: hidden;
        padding: 30px;
    }

    .booking-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .emoji-large {
        font-size: 60px;
        margin-bottom: 10px;
    }

    .booking-header h1 {
        color: purple;
        font-size: 28px;
        margin-bottom: 8px;
    }

    .booking-header p {
        color: #666;
        font-size: 16px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
        font-size: 14px;
    }

    .form-select, .form-input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
        background: white;
    }

    .form-select:focus, .form-input:focus {
        outline: none;
        border-color: purple;
        box-shadow: 0 0 0 3px rgba(128, 0, 128, 0.1);
    }

    .input-hint {
        display: block;
        font-size: 12px;
        color: #999;
        margin-top: 5px;
    }

    .fare-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        margin: 25px 0;
        color: white;
    }

    .fare-label {
        font-size: 14px;
        opacity: 0.9;
        letter-spacing: 1px;
    }

    .fare-amount {
        font-size: 48px;
        font-weight: bold;
        margin: 10px 0;
    }

    .fare-note {
        font-size: 12px;
        opacity: 0.8;
    }

    .submit-btn {
        width: 100%;
        background: purple;
        color: white;
        border: none;
        padding: 14px;
        font-size: 18px;
        font-weight: 600;
        border-radius: 40px;
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
    }

    .submit-btn:hover {
        background: #5a1a5a;
        transform: scale(1.02);
    }

    .back-link {
        text-align: center;
        margin-top: 20px;
    }

    .back-link a {
        color: purple;
        text-decoration: none;
        font-size: 14px;
    }

    .back-link a:hover {
        text-decoration: underline;
    }
</style>

<script>
    function updateFare() {
        let passengers = document.getElementById('passengers').value;
        let fare = passengers * 40;
        document.getElementById('fare_amount').innerText = fare;
    }

    function prepareSubmit() {
        let pickup = document.getElementById('pickup').value;
        let pickupDetails = document.getElementById('pickup_details').value;
        let dropoff = document.getElementById('dropoff').value;
        let passengers = document.getElementById('passengers').value;
        let fare = passengers * 40;

        // Combine pickup with details if provided
        let fullPickup = pickup;
        if (pickupDetails.trim() !== "") {
            fullPickup = pickup + " - " + pickupDetails;
        }

        // Create hidden inputs for the actual form submission
        let hiddenPickup = document.createElement('input');
        hiddenPickup.type = 'hidden';
        hiddenPickup.name = 'pickup';
        hiddenPickup.value = fullPickup;

        let hiddenDropoff = document.createElement('input');
        hiddenDropoff.type = 'hidden';
        hiddenDropoff.name = 'dropoff';
        hiddenDropoff.value = dropoff;

        let hiddenPassengers = document.createElement('input');
        hiddenPassengers.type = 'hidden';
        hiddenPassengers.name = 'passengers';
        hiddenPassengers.value = passengers;

        let hiddenFare = document.createElement('input');
        hiddenFare.type = 'hidden';
        hiddenFare.name = 'fare';
        hiddenFare.value = fare;

        let form = document.forms[0];
        form.appendChild(hiddenPickup);
        form.appendChild(hiddenDropoff);
        form.appendChild(hiddenPassengers);
        form.appendChild(hiddenFare);

        return true;
    }
</script>
{% endblock %}
