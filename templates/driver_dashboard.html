<!-- ACCEPTED RIDES - currently being driven -->
<h3>✅ My Accepted Rides</h3>
{% if my_accepted %}
<div style="overflow-x: auto;">
    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background: purple; color: white;">
                <th style="padding: 10px;">ID</th>
                <th style="padding: 10px;">Passenger</th>
                <th style="padding: 10px;">Pickup</th>
                <th style="padding: 10px;">Dropoff</th>
                <th style="padding: 10px;">💰 Fare</th>
                <th style="padding: 10px;">Complete</th>
                <th style="padding: 10px;">Notify Arrival</th>
             </tr>
        </thead>
        <tbody>
            {% for b in my_accepted %}
            <tr style="border-bottom: 1px solid #ddd;">
                <td style="padding: 10px;">#{{ b.id }}</td>
                <td style="padding: 10px;">{{ b.passenger_name }}</td>
                <td style="padding: 10px;">{{ b.pickup[:25] }}...</td>
                <td style="padding: 10px;">{{ b.dropoff[:25] }}...</td>
                <td style="padding: 10px; color: green; font-weight: bold;">₱{{ b.fare }}</td>
                <td style="padding: 10px;">
                    <a href="{{ url_for('views.complete_ride', booking_id=b.id) }}" class="btn" style="background: blue;">Complete</a>
                </td>
                <td style="padding: 10px;">
                    <a href="{{ url_for('views.notify_arrival', booking_id=b.id) }}" class="btn" style="background: orange;">📢 Arrived</a>
                </td>
             </tr>
            {% endfor %}
        </tbody>
     </table>
</div>
{% else %}
<p>No accepted rides.</p>
{% endif %}
