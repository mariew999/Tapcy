{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Driver Portal</h2>
    
    <div style="margin-bottom: 20px;">
        <button onclick="showLogin()" id="loginBtn" class="btn" style="background: purple; margin-right: 10px;">Login</button>
        <button onclick="showRegister()" id="registerBtn" class="btn" style="background: gray;">Register</button>
    </div>
    
    <!-- Login Form -->
    <div id="loginForm">
        <h3>Login to Drive</h3>
        <form method="POST" action="{{ url_for('views.driver_login') }}">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
    
    <!-- Register Form -->
    <div id="registerForm" style="display: none;">
        <h3>Register as Driver</h3>
        <form method="POST" action="{{ url_for('views.driver_register') }}" onsubmit="return validateDriverForm()">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="text" name="phone" placeholder="Phone Number (11 digits)" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password (min 8 characters)" required>
            <input type="password" name="confirm" placeholder="Confirm Password" required>
            <input type="text" name="tricycle" placeholder="Tricycle Body Number" required>
            <button type="submit">Register as Driver</button>
        </form>
    </div>
</div>

<script>
    function showLogin() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginBtn').style.background = 'purple';
        document.getElementById('registerBtn').style.background = 'gray';
    }

    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('loginBtn').style.background = 'gray';
        document.getElementById('registerBtn').style.background = 'purple';
    }

    function validateDriverForm() {
        var phone = document.querySelector('input[name="phone"]').value;
        var email = document.querySelector('input[name="email"]').value;
        var password = document.querySelector('input[name="password"]').value;
        var confirm = document.querySelector('input[name="confirm"]').value;

        if (!/^\d{11}$/.test(phone)) {
            alert('Phone number must be exactly 11 digits');
            return false;
        }

        if (!email.includes('@')) {
            alert('Email must contain @ symbol');
            return false;
        }

        if (password.length < 8) {
            alert('Password must be at least 8 characters');
            return false;
        }

        if (password !== confirm) {
            alert('Passwords do not match');
            return false;
        }

        return true;
    }

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        if (tab === 'register') {
            showRegister();
        }
    }
</script>
{% endblock %}
